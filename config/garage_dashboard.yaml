          - entity: sensor.adu_garage_cielo_temperature
            name: Temperature
          - entity: sensor.adu_garage_cielo_humidity
            name: Humidity
          - entity: sensor.adu_garage_cielo_target_temperature
            name: Target Temp
          - entity: binary_sensor.adu_garage_cielo_status
            name: Connected

      - type: entities
        title: Controls
        entities:
          - entity: switch.adu_garage_cielo_power
            name: Power
          - entity: select.adu_garage_cielo_hvac
            name: Mode
          - entity: select.adu_garage_cielo_fan
            name: Fan Speed
          - entity: select.adu_garage_cielo_swing
            name: Swing
          - entity: select.adu_garage_cielo_preset
            name: Preset
          - entity: number.adu_garage_cielo_target_temperature
            name: Target Temperature
          - entity: number.adu_garage_cielo_temperature_offset
            name: Temperature Offset

      - type: entities
        title: Display
