title: ADU
views:
  - title: Overview
    icon: mdi:home-outline
    cards:
      - type: horizontal-stack
        cards:
          - type: thermostat
            entity: climate.adu_garage_cielo
            name: Garage
          - type: thermostat
            entity: climate.adu_living_room_cielo
            name: Living Room

      - type: horizontal-stack
        cards:
          - type: thermostat
            entity: climate.adu_bedroom_cielo
            name: Bedroom
          - type: thermostat
            entity: climate.adu_bathroom_cielo
            name: Bathroom

      - type: glance
        title: Current Conditions
        entities:
          - entity: sensor.adu_garage_cielo_temperature
            name: Garage
          - entity: sensor.adu_living_room_cielo_temperature
            name: Living Room
          - entity: sensor.adu_bedroom_cielo_temperature
            name: Bedroom
          - entity: sensor.adu_bathroom_cielo_temperature
            name: Bathroom

      - type: glance
        title: Humidity
        entities:
          - entity: sensor.adu_garage_cielo_humidity
            name: Garage
          - entity: sensor.adu_living_room_cielo_humidity
            name: Living Room
          - entity: sensor.adu_bedroom_cielo_humidity
            name: Bedroom
          - entity: sensor.adu_bathroom_cielo_humidity
            name: Bathroom

      - type: glance
        title: Connectivity
        entities:
          - entity: binary_sensor.adu_garage_cielo_status
            name: Garage
          - entity: binary_sensor.adu_living_room_cielo_status
            name: Living Room
          - entity: binary_sensor.adu_bedroom_cielo_status
            name: Bedroom
          - entity: binary_sensor.adu_bathroom_cielo_status
            name: Bathroom

      - type: history-graph
        title: Temperature History
        hours_to_show: 24
        entities:
          - entity: sensor.adu_garage_cielo_temperature
            name: Garage
          - entity: sensor.adu_living_room_cielo_temperature
            name: Living Room
          - entity: sensor.adu_bedroom_cielo_temperature
            name: Bedroom
          - entity: sensor.adu_bathroom_cielo_temperature
            name: Bathroom

      - type: history-graph
        title: Humidity History
        hours_to_show: 24
        entities:
          - entity: sensor.adu_garage_cielo_humidity
            name: Garage
          - entity: sensor.adu_living_room_cielo_humidity
            name: Living Room
          - entity: sensor.adu_bedroom_cielo_humidity
            name: Bedroom
          - entity: sensor.adu_bathroom_cielo_humidity
            name: Bathroom

  - title: Garage
    icon: mdi:garage
    cards:
      - type: thermostat
        entity: climate.adu_garage_cielo
        name: Garage Climate

      - type: glance
        title: Current Conditions
